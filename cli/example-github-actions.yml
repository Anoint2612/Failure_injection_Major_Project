name: Continuous Resilience Testing

on: [push, pull_request]

jobs:
  resilience-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy Target App & Orchestrator
        run: docker-compose -f target-app/docker-compose.yml up -d --build
        
      - name: Install ChaosCore CLI Dependencies
        run: pip install requests
        
      - name: Execute Chaos GameDay
        run: python cli/chaos-cli.py run --scenario gateway-latency --target auth-service --delay 500ms --max-mttr 1000
