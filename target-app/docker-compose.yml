version: '3.8'

services:
  auth-service:
    build: ./auth-service
    networks:
      - test-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  data-service:
    build: ./data-service
    networks:
      - test-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - data-service
    networks:
      - test-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - test-net

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
